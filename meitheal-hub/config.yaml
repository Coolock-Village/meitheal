name: "Meitheal"
version: "0.2.0"
slug: "meitheal"
description: "Cooperative task and life engine with HA calendar sync"
url: "https://github.com/Coolock-Village/meitheal"
github: "Coolock-Village/meitheal"
docs_url: "https://github.com/Coolock-Village/meitheal/tree/main/meitheal-hub/DOCS.md"
image: "coolockvillage/meitheal-{arch}"
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
ingress: true
ingress_port: 3000
ingress_entry: /
homeassistant_api: true
hassio_api: true
hassio_role: default
auth_api: true
panel_icon: mdi:account-group
panel_title: "Meitheal"
panel_admin: false
apparmor: true
map:
  - homeassistant_config:rw
tmpfs: true
watchdog: http://[HOST]:[PORT:3000]/api/health
backup: cold
backup_exclude:
  - "*.log"
  - "*.tmp"
stage: experimental
options:
  log_level: info
  log_categories:
    - auth
    - tasks
    - integrations
    - observability
  log_redaction: true
  audit_enabled: true
  loki_url: "http://a0d7b954-loki:3100/loki/api/v1/push"
schema:
  log_level: list(debug|info|warn|error)
  log_categories:
    - str
  log_redaction: bool
  audit_enabled: bool
  loki_url: str
