name: ✨ Feature Request
description: Suggest an idea or improvement for Meitheal
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Meitheal is built in the spirit of cooperative work — your ideas make it better for everyone.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Is it related to a frustration?
      placeholder: I find it difficult to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like — how should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you've thought about.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      description: Which part of Meitheal does this relate to?
      options:
        - Dashboard
        - Kanban Board
        - Task List / Table
        - Calendar / Today / Upcoming
        - Settings
        - Home Assistant Integration
        - Sidebar / Navigation
        - Search / Command Palette
        - API
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would improve my workflow
        - Critical for my use case
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, examples from other tools, etc.
    validations:
      required: false
