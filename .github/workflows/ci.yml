name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Verify required governance files
        run: |
          test -f README.md
          test -f AGENTS.md
          test -f WEBMCP.md
          test -f .zeroclaw/soul.md
          test -f .skills/core-workflows/SKILL.md
          test -f public/.well-known/mcp.json
          test -f public/.well-known/jsondoc.json

  typecheck-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm --filter @meitheal/tests test

  ha-harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @meitheal/tests test e2e/ha-calendar-adapter.spec.ts

  migration-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: MEITHEAL_DB_URL=file:./.data/ci-migrations.db pnpm --filter @meitheal/web db:migrate
      - run: MEITHEAL_DB_URL=file:./.data/ci-migrations.db pnpm --filter @meitheal/web db:migrate:check

  schema-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @meitheal/web schema:drift

  perf-budgets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @meitheal/web build
      - name: Guard — no absolute font paths in CSS
        run: |
          if grep -r 'url(/_astro/' apps/web/dist/client/_astro/*.css 2>/dev/null; then
            echo "::error::Absolute /_astro/ font paths found in CSS — will 404 behind HA ingress"
            exit 1
          fi
          echo "✅ No absolute font paths in CSS"
      - run: pnpm --filter @meitheal/web perf:budget

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit
