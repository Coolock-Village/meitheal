name: Live Vikunja Voice Assistant Compatibility

on:
  workflow_dispatch:
    inputs:
      meitheal_base_url:
        description: "Base URL for Meitheal (without /api/v1)"
        required: true
        type: string
      voice_assistant_ref:
        description: "NeoHuncho/vikunja-voice-assistant ref (branch/tag/sha)"
        required: false
        default: "main"
        type: string

permissions:
  contents: read

jobs:
  live-vikunja-voice-compat:
    runs-on: ubuntu-latest
    env:
      MEITHEAL_COMPAT_BASE_URL: ${{ inputs.meitheal_base_url }}
      MEITHEAL_VIKUNJA_TOKEN: ${{ secrets.MEITHEAL_VIKUNJA_COMPAT_TOKEN }}
      VOICE_ASSISTANT_SOURCE_DIR: /tmp/vikunja-voice-assistant
      VOICE_ASSISTANT_REF: ${{ inputs.voice_assistant_ref }}
    steps:
      - uses: actions/checkout@v6

      - name: Validate secret presence
        run: |
          if [ -z "${MEITHEAL_VIKUNJA_TOKEN}" ]; then
            echo "MEITHEAL_VIKUNJA_COMPAT_TOKEN secret is required"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --upgrade requests

      - name: Fetch vikunja-voice-assistant client source
        run: |
          git clone --depth 1 --branch "${VOICE_ASSISTANT_REF}" \
            https://github.com/NeoHuncho/vikunja-voice-assistant.git \
            "${VOICE_ASSISTANT_SOURCE_DIR}"

      - name: Run live compatibility verification
        run: python tests/scripts/verify_vikunja_voice_assistant_compat.py
