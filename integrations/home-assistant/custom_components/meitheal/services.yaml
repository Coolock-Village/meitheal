create_task:
  name: Create Task
  description: Create a new task in Meitheal.
  fields:
    title:
      name: Title
      description: Task title
      required: true
      selector:
        text:
    description:
      name: Description
      description: Optional task description
      required: false
      selector:
        text:
          multiline: true

complete_task:
  name: Complete Task
  description: Mark a task as done by ID or title.
  fields:
    task_id:
      name: Task ID
      description: The task ID to complete (use either this or title)
      required: false
      selector:
        text:
    title:
      name: Title
      description: Find and complete a task by title (use either this or task_id)
      required: false
      selector:
        text:

sync_todo:
  name: Sync Tasks
  description: Trigger a manual refresh of task data from Meitheal.
