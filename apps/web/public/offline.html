<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Meitheal</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }
      .container {
        text-align: center;
        max-width: 400px;
      }
      .icon {
        font-size: 4rem;
        margin-bottom: 1rem;
        opacity: 0.6;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }
      p {
        color: #94a3b8;
        margin-bottom: 1.5rem;
        line-height: 1.6;
      }
      button {
        background: #3b82f6;
        color: #fff;
        border: none;
        padding: 0.75rem 2rem;
        border-radius: 0.5rem;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #2563eb;
      }
      button:active {
        background: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon" aria-hidden="true">⊘</div>
      <h1>You're offline</h1>
      <p>
        Meitheal can't reach the server right now. Your changes are saved
        locally and will sync automatically when you're back online.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
