name: RICE
version: 1.0.0
formula: "(reach * impact * confidence) / effort"
fields:
  - key: reach
    label: Reach
    type: number
    min: 0
    max: 1000000
    weight: 1
  - key: impact
    label: Impact
    type: number
    min: 0
    max: 5
    weight: 1
  - key: confidence
    label: Confidence
    type: number
    min: 0
    max: 100
    weight: 1
  - key: effort
    label: Effort
    type: number
    min: 1
    max: 1000
    weight: 1
